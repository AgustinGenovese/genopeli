<div class="card" (click)="onClick()">
  @if (resultado().poster_url) {
    <img [src]="getPosterUrl()" 
         [alt]="resultado().titulo" 
         class="poster"
         loading="lazy" />
  } @else {
    <div class="poster sin-poster">Sin imagen</div>
  }

  <div class="info">
    <div class="meta">
      <span class="badge">{{ resultado().tipo === 'movie' ? 'Película' : 'Serie' }}</span>
      <span class="ranking">⭐ {{ resultado().ranking.toFixed(1) }}</span>
    </div>
    <h3 class="titulo">{{ resultado().titulo }}</h3>
    <div class="plataformas">
      @for (p of resultado().plataformas; track p.provider_id) {
        <a [href]="getStreamingUrl(p.provider_id, resultado().titulo, resultado().tipo)" 
           target="_blank" 
           rel="noopener" 
           [title]="'Ver en ' + p.nombre"
           (click)="$event.stopPropagation()">
          <img [src]="p.logo" [alt]="p.nombre" class="logo-plataforma" />
        </a>
      }
    </div>
  </div>
</div>
